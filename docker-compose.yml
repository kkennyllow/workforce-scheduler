services:
  db:
    image: postgres:16-alpine
    container_name: workforce-scheduler-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-workforce_scheduler}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-workforce_scheduler}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
    container_name: workforce-scheduler-api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: ${API_PORT:-4000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/workforce_scheduler?schema=public}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-local-dev}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT:-4000}:4000"

  web:
    build:
      context: ./web
    container_name: workforce-scheduler-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-5173}:5173"

volumes:
  postgres-data:
